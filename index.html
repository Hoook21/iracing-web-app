<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>iRacing App</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0b1220;
      color: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100%, 420px);
      padding: 32px;
      border: 1px solid #263449;
      border-radius: 24px;
      background: #131e2f;
      text-align: center;
      box-shadow: 0 20px 50px rgb(0 0 0 / 25%);
    }
    h1 { margin: 0 0 12px; font-size: 2rem; }
    p { margin: 0; color: #aebed2; line-height: 1.5; }
    .status {
      display: inline-block;
      margin-top: 24px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #163d31;
      color: #63e6a5;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>iRacing App</h1>
    <p>Diese Web-App ist sicher über HTTPS erreichbar.</p>
    <div class="status">Online</div>
  </main>
</body>
</html>
